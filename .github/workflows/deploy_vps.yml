name: Build And Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: lucasremigio/strava-weekly-post

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file securely
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_CLUB_ID: ${{ secrets.STRAVA_CLUB_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANNUAL_GOAL_KM: ${{ vars.ANNUAL_GOAL_KM }}
          TOTAL_WEEKS: ${{ vars.TOTAL_WEEKS }}
          SPORT_TYPES: ${{ vars.SPORT_TYPES }}
          HTTP_TIMEOUT_SECONDS: ${{ vars.HTTP_TIMEOUT_SECONDS }}
        run: |
          cat << EOF > .env
          STRAVA_CLIENT_ID=$STRAVA_CLIENT_ID
          STRAVA_CLIENT_SECRET=$STRAVA_CLIENT_SECRET
          STRAVA_REFRESH_TOKEN=$STRAVA_REFRESH_TOKEN
          STRAVA_CLUB_ID=$STRAVA_CLUB_ID
          GOOGLE_SERVICE_ACCOUNT_JSON=$GOOGLE_SERVICE_ACCOUNT_JSON
          GOOGLE_SHEET_ID=$GOOGLE_SHEET_ID
          TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
          TELEGRAM_CHAT_IDS=$TELEGRAM_CHAT_IDS
          OPENAI_API_KEY=$OPENAI_API_KEY
          ANNUAL_GOAL_KM=$ANNUAL_GOAL_KM
          TOTAL_WEEKS=$TOTAL_WEEKS
          SPORT_TYPES=$SPORT_TYPES
          HTTP_TIMEOUT_SECONDS=$HTTP_TIMEOUT_SECONDS
          EOF

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment files to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ~/apps/strava-weekly-post"
          scp docker-compose.yml .env ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/apps/strava-weekly-post/

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
            export TAG=${{ github.sha }}
            cd ~/apps/strava-weekly-post

            # Pull the exact version we just built
            docker pull lucasremigio/strava-weekly-post:\$TAG

            # Deploy the container quietly
            docker compose up -d --force-recreate --remove-orphans
            
            # Clean up old images (keeps disk usage low)
            docker image prune -a -f
          EOF
