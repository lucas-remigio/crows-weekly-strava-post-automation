name: Build And Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: lucasremigio/strava-weekly-post

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ~/strava-weekly-post
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment files to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"
          scp docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            
            # Save the TAG to .env for manual restarts
            echo "TAG=${{ github.sha }}" > .env

            export TAG='${{ github.sha }}'
            export STRAVA_CLIENT_ID='${{ secrets.STRAVA_CLIENT_ID }}'
            export STRAVA_CLIENT_SECRET='${{ secrets.STRAVA_CLIENT_SECRET }}'
            export STRAVA_REFRESH_TOKEN='${{ secrets.STRAVA_REFRESH_TOKEN }}'
            export STRAVA_CLUB_ID='${{ secrets.STRAVA_CLUB_ID }}'
            export GOOGLE_SERVICE_ACCOUNT_JSON='${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}'
            export GOOGLE_SHEET_ID='${{ secrets.GOOGLE_SHEET_ID }}'
            export TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}'
            export TELEGRAM_CHAT_IDS='${{ secrets.TELEGRAM_CHAT_IDS }}'
            export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}'
            export ANNUAL_GOAL_KM='${{ vars.ANNUAL_GOAL_KM }}'
            export SPORT_TYPES='${{ vars.SPORT_TYPES }}'
            export HTTP_TIMEOUT_SECONDS='${{ vars.HTTP_TIMEOUT_SECONDS }}'

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          EOF
