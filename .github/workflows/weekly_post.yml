name: Weekly Strava Club Post

on:
  # Manual trigger only. Scheduling is handled on the VPS cron.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch data and print post, skip Sheets & Telegram)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      week:
        description: "ISO week number to process (leave empty for current week). Use to recover a missed cron run."
        required: false
        default: ""
        type: string

jobs:
  weekly-post:
    name: Generate and send weekly post
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go/go.sum

      - name: Download dependencies
        working-directory: ./go
        run: go mod download

      - name: Run weekly post script
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_CLUB_ID: ${{ secrets.STRAVA_CLUB_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          ANNUAL_GOAL_KM: ${{ vars.ANNUAL_GOAL_KM }}
          TOTAL_WEEKS: ${{ vars.TOTAL_WEEKS }}
          SPORT_TYPES: ${{ vars.SPORT_TYPES }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ github.event.inputs.week }}" ] && ARGS="$ARGS --week ${{ github.event.inputs.week }}"
          go run ./go $ARGS
